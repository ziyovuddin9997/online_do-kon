{% extends 'base.html' %}

{% block content %}
    <div class="mx-auto max-w-[1120px] grid grid-cols-12 gap-10 mt-10">
        {% if messages %}
            {% for message in messages %}
                <small class="col-span-12 my-2 text-green-500 w-full text-center font-semibold">{{ message }}</small>
            {% endfor %}
        {% endif %}
        <img src="{{ product.image.url }}" class="col-span-6 rounded-xl">
        <div class="col-span-6 flex flex-col gap-4">
            <form action="" method="post" class="flex flex-col gap-4">
                {% csrf_token %}
                <div class="w-[250px] flex flex-row items-center justify-between">
                    <button type="button" id="minusBtn" class="bg-yellow-500 text-white py-2 px-8 rounded-lg hover:cursor-pointer hover:bg-yellow-600 active:bg-yellow-700 active:scale-95 transition">-</button>
                    <input name="quantity" id="displayValue" value="1" type="text" class="text-gray-500 max-w-[100px] focus:outline-none py-1.5 border-2 border-gray-400 rounded-lg text-center">
                    <button type="button" id="plusBtn" class="bg-yellow-500 text-white py-2 px-8 rounded-lg hover:cursor-pointer hover:bg-yellow-600 active:bg-yellow-700 active:scale-95 transition">+</button>
                </div>
                <button type="submit" class="flex flex-row items-center justify-center gap-1 w-[250px] bg-yellow-500 text-white py-2 px-8 rounded-lg hover:cursor-pointer hover:bg-yellow-600 active:bg-yellow-700 active:scale-95 transition">
                    <span class="material-icons">shopping_cart</span>
                    Sotib olish
                </button>
            </form>
            <h2 class="text-gray-700 text-3xl">{{ product.name }}</h2>
            <p class="text-gray-500">{{ product.description|linebreaksbr }}</p>
        </div>
    </div>

    <script type="text/javascript">
        const minusBtn = document.getElementById("minusBtn");
        const displayValue = document.getElementById("displayValue");
        const plusBtn = document.getElementById("plusBtn");

        plusBtn.addEventListener("click", () => {
            displayValue.value = Number(displayValue.value) + 1
        })

        minusBtn.addEventListener("click", () => {
            const result = Number(displayValue.value) - 1;
            if (result >= 1) {
                displayValue.value = result
            }
        })

    </script>
{% endblock content %}
